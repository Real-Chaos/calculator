<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos | Calculator</title>
    <!--Stylesheet + Favicon-->
    <link rel="shortcut icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <!--Font Awesome CDN-->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css" integrity="sha384-vSIIfh2YWi9wW0r9iZe7RJPrKwp6bG+s9QZMoITbCckVJqGCCRhc+ccxNcdpHuYu" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="iphone">
            <img class='img' src="images/iphone.jpg" alt="">
            <main>
            <div class="iphoneTopSymbols">
                <i class="fas fa-signal signal"></i>
                <i class="fas fa-wifi wifi"></i>
                <strong class="time">9:42  AM</strong>

                <span class="battery"><p class="percent">75%</p><i class="fas fa-battery-three-quarters"></i></span>
            </div>
            <div class="display">
                <div class="responsive">
                <p class="displaySection">0</p>
                </div>
            </div>
            <div class="calculator">
                <button class="extra clear circle">C</button>
               <button class="extra remainder operator circle"><i class="fas fa-percent"></i></button>
               <button class="operator divide circle"><i class="fas fa-divide"></i></button>
               <button class="number seven circle">7</button>
               <button class="number eight circle">8</button>
               <button class="number nine circle">9</button>
               <button class="operator multiply circle"><i class="fas fa-times"></i></button>
               <button class="number four circle">4</button>
               <button class="number five circle">5</button>
               <button class="number six circle">6</button>
               <button class="operator subtract circle"><i class="fas fa-minus"></i></button>
               <button class="number one circle">1</button>
               <button class="number two circle">2</button>
               <button class="number three circle">3</button>
               <button class="operator add circle"><i class="fas fa-plus"></i></button>
               <button class="number zero">0</button>
               <button class="decimal circle ">.</button>
               <button class="equals circle"><i class="fas fa-equals"></i></button>
               
            </div>
            </main>
            <button class="home"></button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
